<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MingleJoys AI & Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p-green: #00A36C; }
        body { font-family: sans-serif; margin: 0; background: #fff; }

        /* আপনার মেইন স্টোর পেজের ডিজাইন */
        .header { background: #fff; padding: 12px 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .search-row { display: flex; align-items: center; gap: 10px; background: #f1f5f9; border-radius: 25px; padding: 5px 15px; border: 1px solid #ddd; }
        .search-row input { border: none; background: transparent; outline: none; width: 100%; padding: 8px; font-size: 16px; }

        /* ইউটিউব স্টাইল উজ্জ্বল ফিল্টার */
        .filter-nav { display: flex; overflow-x: auto; white-space: nowrap; padding: 12px; gap: 10px; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .filter-nav::-webkit-scrollbar { display: none; }
        .chip { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; color: #475569; background: #fff; border: 1.5px solid #ddd; cursor: pointer; }
        .chip.active { background: var(--p-green) !important; color: #fff !important; border-color: var(--p-green) !important; }

        /* এআই চ্যাট পেজ ইন্টারফেস */
        #ai-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 200; display: none; flex-direction: column; }
        .ai-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* চ্যাট বাবল */
        .msg { max-width: 80%; padding: 12px 15px; border-radius: 18px; font-size: 15px; }
        .user { align-self: flex-end; background: var(--p-green); color: #fff; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }

        /* ইনপুট বক্স ডিজাইন */
        .ai-input-area { padding: 15px; border-top: 1px solid #eee; }
        .pill-box { border: 2.5px solid var(--p-green); border-radius: 25px; padding: 12px 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .pill-box input { width: 100%; border: none; outline: none; font-size: 16px; margin-bottom: 10px; }
        .send-btn { background: var(--p-green); color: #fff; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <div class="search-row">
                <i class="fas fa-arrow-left"></i>
                <input type="text" placeholder="Search MingleJoys...">
                <i class="fas fa-search"></i>
            </div>
        </div>
        <div class="filter-nav">
            <div class="chip active" onclick="setChip(this)">All</div>
            <div class="chip" onclick="setChip(this)">People</div>
            <div class="chip" onclick="setChip(this)">Store</div>
            <div class="chip" onclick="setChip(this)">Gifts</div>
            <div class="chip" onclick="openChat()" style="color: var(--p-green); border-color: var(--p-green);">MJ-AI ✨</div>
            <div class="chip" style="color: red;">Feedback</div>
        </div>
        <div style="text-align: center; padding: 50px; color: #94a3b8;">
            <p>আপনার স্টোর এবং ফিল্টারগুলো এখানে লোড হবে</p>
        </div>
    </div>

    <div id="ai-page">
        <div class="ai-header">
            <i class="fas fa-chevron-left" style="cursor: pointer; font-size: 20px;" onclick="closeChat()"></i>
            <b style="margin-left: 15px;">Mingle AI</b>
        </div>
        <div class="chat-window" id="chatFlow">
            <div id="welcome" style="text-align: center; margin-top: 40px;">
                <h1 style="font-size: 32px;">How can I help?</h1>
            </div>
        </div>
        <div class="ai-input-area">
            <div class="pill-box">
                <input type="text" id="userInput" placeholder="Ask me anything...">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #64748b; font-weight: bold;"><i class="fas fa-paperclip"></i> Tools</span>
                    <button class="send-btn" onclick="callGroqAI()"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // এখানে আপনার সেই নতুন কী-টি বসানো হয়েছে
        const MY_KEY = "Gsk_j3e9g91uXpn93Jy70hOOWGdyb3FYdf7HiCGJnQ6qoN4zj2U0iMSE";

        function setChip(el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function openChat() { document.getElementById('ai-page').style.display = 'flex'; }
        function closeChat() { document.getElementById('ai-page').style.display = 'none'; }

        async function callGroqAI() {
            const inp = document.getElementById('userInput');
            const flow = document.getElementById('chatFlow');
            const query = inp.value.trim();
            if(!query) return;

            document.getElementById('welcome').style.display = 'none';
            addBubble('user', query);
            inp.value = '';

            const botBubble = addBubble('bot', 'MJ-AI টাইপ করছে...');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${MY_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "llama3-8b-8192",
                        "messages": [
                            { "role": "system", "content": "তুমি MingleJoys-এর MJ-AI সহকারী। তুমি বন্ধুত্বপূর্ণ ভাষায় কথা বলো।" },
                            { "role": "user", "content": query }
                        ]
                    })
                });
                const result = await response.json();
                botBubble.innerText = result.choices[0].message.content;
            } catch (err) {
                botBubble.innerText = "দুঃখিত, কানেকশনে সমস্যা হয়েছে। আবার চেষ্টা করুন।";
            }
        }

        function addBubble(role, txt) {
            const d = document.createElement('div');
            d.className = 'msg ' + role;
            d.innerText = txt;
            document.getElementById('chatFlow').appendChild(d);
            document.getElementById('chatFlow').scrollTop = document.getElementById('chatFlow').scrollHeight;
            return d;
        }
    </script>
</body>
</html>
