<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingle Search & AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <style>
        :root { --p-green: #00A36C; --text-dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #fff; overflow-x: hidden; }

        /* হেডার */
        .header { background: #fff; padding: 12px 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #f1f5f9; }
        .search-row { display: flex; align-items: center; gap: 12px; }
        .back-icon { font-size: 20px; color: #000; cursor: pointer; }
        .search-box { flex: 1; display: flex; align-items: center; background: #f1f5f9; border-radius: 25px; padding: 8px 15px; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 16px; margin: 0 8px; }

        /* ইউটিউব স্টাইল স্ক্রোলযোগ্য ফিল্টার */
        .filter-nav {
            display: flex; overflow-x: auto; white-space: nowrap; padding: 12px 15px;
            gap: 10px; background: #fff; border-bottom: 1px solid #f1f5f9;
            scrollbar-width: none; /* Firefox */
        }
        .filter-nav::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .chip {
            padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 700;
            color: #1e293b; background: #f1f5f9; cursor: pointer; border: 1.5px solid #e2e8f0;
            transition: 0.3s all ease;
        }
        /* টিপলে যে রং হবে */
        .chip.active { background: var(--p-green) !important; color: #fff !important; border-color: var(--p-green) !important; box-shadow: 0 4px 10px rgba(0, 163, 108, 0.2); }
        .chip:active { transform: scale(0.95); }

        /* AI Page (QuillBot Style) */
        #ai-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 200; display: none; flex-direction: column;
        }
        .ai-top { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .hero-title { text-align: center; margin-top: 60px; }
        .hero-title h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        
        /* মেসেজ বাবল */
        .msg { max-width: 80%; padding: 12px 15px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--p-green); color: #fff; }
        .bot { align-self: flex-start; background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }

        /* ইনপুট বক্স */
        .bottom-input { padding: 15px; border-top: 1px solid #f1f5f9; }
        .input-pill { border: 2px solid var(--p-green); border-radius: 22px; padding: 12px 18px; }
        .input-pill input { width: 100%; border: none; outline: none; font-size: 16px; margin-bottom: 10px; }
        .actions { display: flex; justify-content: space-between; align-items: center; }
        .send-btn { background: var(--p-green); color: #fff; width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="search-interface">
        <div class="header">
            <div class="search-row">
                <i class="fas fa-arrow-left back-icon" onclick="history.back()"></i>
                <div class="search-box">
                    <input type="text" placeholder="Search MingleJoys...">
                    <i class="fas fa-search" style="color: #64748b;"></i>
                </div>
            </div>
        </div>

        <div class="filter-nav">
            <div class="chip active" onclick="selectChip(this)">All</div>
            <div class="chip" onclick="selectChip(this)">Mingle</div>
            <div class="chip" onclick="selectChip(this)">Store</div>
            <div class="chip" onclick="selectChip(this)">Gifts</div>
            <div class="chip" onclick="selectChip(this)">Photos</div>
            <div class="chip" onclick="selectChip(this)">Videos</div>
            <div class="chip" onclick="openAI()" style="color: var(--p-green); border-color: var(--p-green);">MJ-AI ✨</div>
            <div class="chip" onclick="alert('Feedback Clicked')" style="color: #ef4444;">Feedback</div>
        </div>
        
        <div style="padding: 100px 20px; text-align: center; color: #94a3b8;">
            <i class="fas fa-search" style="font-size: 50px; margin-bottom: 15px; opacity: 0.3;"></i>
            <p>আপনার পছন্দের ফিল্টার টিপে সার্চ করুন</p>
        </div>
    </div>

    <div id="ai-container">
        <div class="ai-top">
            <i class="fas fa-chevron-left back-icon" style="font-size: 24px;" onclick="closeAI()"></i>
            <b style="margin-left: 15px; font-size: 18px;">Mingle AI</b>
        </div>

        <div class="chat-area" id="chatWindow">
            <div class="hero-title" id="welcome">
                <h1>How can I help?</h1>
                <p>সবসময় আপনার সেবায় নিয়োজিত।</p>
            </div>
        </div>

        <div class="bottom-input">
            <div class="input-pill">
                <input type="text" id="aiMsg" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMsg()">
                <div class="actions">
                    <div style="display: flex; gap: 15px; color: #64748b;">
                        <span class="material-icons-outlined">attach_file</span>
                        <div style="display: flex; align-items: center; gap: 5px; color: #000; font-weight: 700;">
                            <span class="material-icons-outlined" style="font-size: 18px;">auto_awesome</span> Tools
                        </div>
                    </div>
                    <button class="send-btn" onclick="sendMsg()"><i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ফিল্টার সিলেক্ট করার ফাংশন
        function selectChip(el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function openAI() {
            document.getElementById('ai-container').style.display = 'flex';
        }

        function closeAI() {
            document.getElementById('ai-container').style.display = 'none';
        }

        // মেসেজ পাঠানোর ফাংশন (Gemini API)
        async function sendMsg() {
            const input = document.getElementById('aiMsg');
            const chatWindow = document.getElementById('chatWindow');
            const welcome = document.getElementById('welcome');
            const query = input.value.trim();
            if(!query) return;

            if(welcome) welcome.style.display = 'none';
            
            // ইউজারের মেসেজ
            addBubble('user', query);
            input.value = '';

            // এআই এর উত্তর (Thinking...)
            const botBubble = addBubble('bot', 'MJ-AI ভাবছে...');

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAaS_qlmPBdabKOlpgXXRCDzPr5zkrRlDE`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
                });
                const data = await res.json();
                botBubble.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                botBubble.innerText = "দুঃখিত, কানেকশনে সমস্যা হচ্ছে।";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addBubble(type, text) {
            const win = document.getElementById('chatWindow');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = text;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
