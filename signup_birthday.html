<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Your Birthday - MingleJoys</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif !important;
      -webkit-user-select: none;
      user-select: none; /* ইমেজ বা টেক্সট কপি করা যাবে না */
      -webkit-tap-highlight-color: transparent;
    }

    /* ইমেজ সেভ বা ড্র্যাগ করা বন্ধ করা */
    img {
      -webkit-user-drag: none;
      pointer-events: none;
    }

    body {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* আপনার পাঠানো রিয়েল অ্যারো ব্যাক বাটন */
    .header-nav {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .back-arrow {
      width: 24px; /* অ্যারো সাইজ */
      height: auto;
      cursor: pointer;
    }

    .icon-wrapper { margin-bottom: 15px; }
    .calendar-img { width: 110px; height: auto; }

    header { text-align: center; margin-bottom: 25px; }
    h1 { 
      font-size: 26px; 
      font-weight: 800; 
      color: #000;
      margin-bottom: 8px;
    }
    .subtitle { 
      color: #65676b; 
      font-size: 14px; 
      font-weight: 500; 
      line-height: 1.4;
      padding: 0 20px;
    }

    /* ফেসবুক স্টাইল বক্স */
    .birthday-box {
      width: 90%;
      background: #ffffff;
      border: 1px solid #ced4da;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 30px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label-tag { 
      font-size: 11px; 
      font-weight: 600; 
      color: #65676b; 
      margin-bottom: 2px;
    }
    
    .display-value { 
      font-size: 17px; 
      font-weight: 500; 
      color: #1c1e21; 
    }

    #datePicker { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      opacity: 0; 
      cursor: pointer; 
    }

    /* ফেসবুকের মতো সরু কন্টিনিউ বাটন */
    .continue-btn {
      width: 100%;
      height: 48px; /* সরু বাটন */
      background: #008069;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .continue-btn:active { transform: scale(0.98); opacity: 0.9; }

    /* ভিডিওর মতো সেন্ট্রাল স্পিনার */
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body oncontextmenu="return false;"> <div class="app-container">
    <div class="header-nav">
      <img src="https://i.ibb.co/LkhmFfG/1000043392.png" class="back-arrow" alt="Back" onclick="history.back()">
    </div>

    <div class="icon-wrapper">
      <img src="https://i.ibb.co/v4YpS6m/calendar-star.png" class="calendar-img" alt="Calendar">
    </div>

    <header>
      <h1>What's your birthday?</h1>
      <p class="subtitle">Choose your date of birth. You can always make this private later.</p>
    </header>

    <div class="birthday-box">
      <span class="label-tag" id="ageLabel">Birthday</span>
      <div class="display-value" id="finalDate">Select Date</div>
      <input type="date" id="datePicker">
    </div>

    <button class="continue-btn" id="submitBtn">
      <span id="btnText">Continue</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1h3IIRC9la-kXyYnVEfwxzzoyBIL70Js",
      authDomain: "my-website-a0545.firebaseapp.com",
      databaseURL: "https://my-website-a0545-default-rtdb.firebaseio.com",
      projectId: "my-website-a0545",
      storageBucket: "my-website-a0545.firebasestorage.app",
      messagingSenderId: "103602694974",
      appId: "1:103602694974:web:12f890844e6ad6a513da6f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const picker = document.getElementById('datePicker');
    const display = document.getElementById('finalDate');
    const ageLabel = document.getElementById('ageLabel');
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');

    picker.oninput = function() {
      const birth = new Date(this.value);
      if(!isNaN(birth)) {
        display.innerText = birth.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        const age = new Date().getFullYear() - birth.getFullYear();
        ageLabel.innerText = `Birthday (${age} years old)`;
      }
    };

    btn.onclick = async function() {
      if(!picker.value) return alert("Please select your birthday.");

      btnText.style.display = "none";
      spinner.style.display = "block";
      btn.style.pointerEvents = "none";

      try {
        const id = Date.now();
        await update(ref(db, 'users/' + id), { birthday: picker.value });
        window.location.href = 'signup_gender.html';
      } catch (e) {
        alert("Error: " + e.message);
        btnText.style.display = "block";
        spinner.style.display = "none";
        btn.style.pointerEvents = "auto";
      }
    };
  </script>
</body>
</html>
