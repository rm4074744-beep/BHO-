<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Identify yourself - MingleJoys</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* ফোনের সিস্টেম ফন্ট ওভাররাইড করতে ইন্টার বোল্ড ফন্ট */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap');

    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif !important;
    }

    input {
      -webkit-user-select: text !important;
      user-select: text !important;
    }

    body {
      background-color: #ffffff;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 450px;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .back-btn {
      font-size: 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    header {
      margin-top: 30px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800; /* এক্সট্রা বোল্ড লুক */
      margin: 0;
      color: #000;
    }

    p.subtitle {
      color: #65676b;
      font-size: 16px;
      margin-top: 10px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #000;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 18px 25px;
      border: 2px solid #008069; /* আপনার অরিজিনাল গ্রিন বর্ডার */
      border-radius: 30px; /* গোল ডিজাইন */
      font-size: 17px;
      font-weight: 700;
      outline: none;
      background: #fff;
    }

    .btn-container {
      margin-top: 20px;
    }

    .continue-btn {
      width: 100%;
      background: #008069;
      color: white;
      border: none;
      padding: 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 128, 105, 0.2);
    }

    .loader {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #msg {
      color: #d32f2f;
      text-align: center;
      margin-top: 15px;
      font-weight: 700;
      display: none;
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="app-container">
    <div class="back-btn" onclick="history.back()">
      <i class="fa-solid fa-chevron-left"></i>
    </div>

    <header>
      <h1>Identify yourself</h1>
      <p class="subtitle">Enter your name to start your MingleJoys journey.</p>
    </header>

    <div class="form-group">
      <label>FIRST NAME</label>
      <input type="text" id="fName" placeholder="First name" autocomplete="off">
    </div>

    <div class="form-group">
      <label>LAST NAME</label>
      <input type="text" id="lName" placeholder="Last name" autocomplete="off">
    </div>

    <div class="btn-container">
      <button class="continue-btn" id="subBtn">
        <span id="btnText">Continue</span>
        <div class="loader" id="loader"></div>
      </button>
      <p id="msg"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1h3IIRC9la-kXyYnVEfwxzzoyBIL70Js",
      authDomain: "my-website-a0545.firebaseapp.com",
      databaseURL: "https://my-website-a0545-default-rtdb.firebaseio.com",
      projectId: "my-website-a0545",
      storageBucket: "my-website-a0545.firebasestorage.app",
      messagingSenderId: "103602694974",
      appId: "1:103602694974:web:12f890844e6ad6a513da6f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btn = document.getElementById('subBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const msg = document.getElementById('msg');

    // Anti-Copy Logic
    document.onkeydown = function(e) {
      if(e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73)) return false;
    };

    btn.onclick = async function() {
      const fn = document.getElementById('fName').value.trim();
      const ln = document.getElementById('lName').value.trim();

      if (!fn || !ln) {
        alert("Please enter your name");
        return;
      }

      // UI Update
      btnText.style.display = "none";
      loader.style.display = "block";
      btn.style.pointerEvents = "none";
      msg.style.display = "none";

      try {
        const id = Date.now();
        // ডাটাবেজে সেভ করা
        await set(ref(db, 'users/' + id), {
          firstName: fn,
          lastName: ln,
          timestamp: new Date().toISOString()
        });
        
        // রিডাইরেক্ট - একদম সরাসরি পাথ ব্যবহার করা হয়েছে
        window.location.assign('signup_birthday.html');

      } catch (e) {
        btnText.style.display = "block";
        loader.style.display = "none";
        btn.style.pointerEvents = "auto";
        msg.innerText = "Error: " + e.message;
        msg.style.display = "block";
        console.error(e);
      }
    };
  </script>
</body>
</html>
