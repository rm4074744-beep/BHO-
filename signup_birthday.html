<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Identify Yourself</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { 
    font-family: 'Inter', sans-serif !important; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent;
  }
  
  body { 
    margin: 0; padding: 0; 
    background-color: #ffffff; /* আপনার চাহিদা মতো একদম সাদা */
    display: flex; flex-direction: column; align-items: center; 
    min-height: 100vh; -webkit-user-select: none;
  }

  .container { width: 90%; max-width: 400px; padding-top: 25px; }

  /* ব্যাক বাটন সরাসরি আগের পেজে নিয়ে যাবে */
  .back-nav { 
    margin-bottom: 25px; cursor: pointer; display: inline-block; 
    padding: 10px; margin-left: -10px;
  }

  h2 { font-size: 26px; font-weight: 800; color: #111827; margin: 0 0 10px 0; letter-spacing: -0.5px; }
  p.subtitle { color: #6b7280; font-size: 15px; margin-bottom: 35px; line-height: 1.5; }

  /* ইনপুট ডিজাইন (আপনার অরিজিনাল গোল ডিজাইন) */
  .input-wrapper { width: 100%; margin-bottom: 20px; }
  
  label { 
    display: block; font-size: 13px; font-weight: 700; 
    color: #374151; margin-bottom: 8px; text-transform: uppercase;
  }
  
  input[type="text"] {
    width: 100%; padding: 18px; 
    border: 2px solid #f3f4f6; border-radius: 20px;
    font-size: 16px; outline: none; background-color: #f9fafb;
    transition: 0.3s; -webkit-user-select: text;
  }
  
  input:focus { border-color: #059669; background-color: #ffffff; }

  /* কন্টিনিউ বাটন */
  .next-btn {
    width: 100%; padding: 15px; 
    background: #059669; color: white; border: none; 
    border-radius: 30px; font-size: 16px; font-weight: 700; 
    margin-top: 20px; cursor: pointer;
    display: flex; justify-content: center; align-items: center; gap: 12px;
    box-shadow: 0 5px 15px rgba(5, 150, 105, 0.2);
  }

  .btn-disabled { opacity: 0.7; pointer-events: none; }

  .spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite; display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ডার্ক নোটিফিকেশন কার্ড */
  #msgCard {
    position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #ffffff; padding: 14px 25px; 
    border-radius: 15px; font-size: 14px; z-index: 9999;
    transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    width: 80%; text-align: center;
  }
  #msgCard.show { top: 30px; }
</style>
</head>
<body>

<div id="msgCard">Connecting...</div>

<div class="container">
  <div class="back-nav" onclick="window.history.back()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </div>

  <h2>Identify yourself</h2>
  <p class="subtitle">Enter your name to start your MingleJoys journey.</p>

  <div class="input-wrapper">
    <label>First Name</label>
    <input type="text" id="fName" placeholder="First name" autofocus>
  </div>

  <div class="input-wrapper">
    <label>Last Name</label>
    <input type="text" id="lName" placeholder="Last name">
  </div>

  <button class="next-btn" id="subBtn">
    <span id="btnTxt">Continue</span>
    <div class="spinner" id="btnSpin"></div>
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

  // আপনার সঠিক কনফিগারেশন
  const firebaseConfig = {
    apiKey: "AIzaSyA1h3IIRC9la-kXyYnVEfwxzzoyBIL70Js",
    authDomain: "my-website-a0545.firebaseapp.com",
    databaseURL: "https://my-website-a0545-default-rtdb.firebaseio.com",
    projectId: "my-website-a0545",
    storageBucket: "my-website-a0545.firebasestorage.app",
    messagingSenderId: "103602694974",
    appId: "1:103602694974:web:12f890844e6ad6a513da6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  function showMsg(text) {
    const card = document.getElementById('msgCard');
    card.innerText = text;
    card.classList.add('show');
    setTimeout(() => card.classList.remove('show'), 3000);
  }

  document.getElementById('subBtn').onclick = async function() {
    const fn = document.getElementById('fName').value.trim();
    const ln = document.getElementById('lName').value.trim();
    const btn = document.getElementById('subBtn');
    const spin = document.getElementById('btnSpin');
    const txt = document.getElementById('btnTxt');

    if (!fn || !ln) {
      showMsg("Please enter your name");
      return;
    }

    btn.classList.add('btn-disabled');
    txt.style.opacity = "0.7";
    spin.style.display = "block";

    let uid = localStorage.getItem("mj_user_id") || "MJ" + Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem("mj_user_id", uid);

    try {
      // রিয়েল-টাইম ডাটাবেসে সেভ করা
      await update(ref(db, 'users/' + uid), {
        firstName: fn,
        lastName: ln,
        regStep: "name_done"
      });

      window.location.href = 'signup_birthday.html';

    } catch (err) {
      btn.classList.remove('btn-disabled');
      spin.style.display = "none";
      txt.style.opacity = "1";
      showMsg("Something went wrong. Try again!");
    }
  };
</script>

</body>
</html>
