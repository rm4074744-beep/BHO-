<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MingleJoys | Smart Shipping</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #50C878; --emerald-soft: #f0faf4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        /* App Bar */
        .app-bar { padding: 18px; display: flex; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .app-bar h1 { font-size: 19px; font-weight: 800; flex: 1; text-align: center; margin-right: 32px; }

        /* Map - এটি ঠিকমতো না দেখালে ম্যাপ আসে না */
        #map { flex: 1; width: 100%; position: relative; z-index: 1; background: #f0f0f0; }
        
        /* Floating Center Pin */
        .map-center-pin {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -100%);
            z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .pin-tooltip { background: #333; color: #fff; padding: 5px 12px; border-radius: 6px; font-size: 11px; margin-bottom: 4px; }

        /* Bottom Sheet */
        .delivery-sheet {
            background: #fff; border-radius: 30px 30px 0 0;
            padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            z-index: 1001; margin-top: -30px;
        }
        .loc-details { background: var(--emerald-soft); padding: 15px; border-radius: 18px; margin-bottom: 20px; border: 1px dashed var(--emerald); }
        .loc-details p { font-size: 13px; font-weight: 600; color: #444; }

        .btn-main { background: var(--emerald); color: #fff; width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-bar"><i class="material-icons-outlined">arrow_back</i><h1>Select Location</h1></div>
    
    <div id="map">
        <div class="map-center-pin">
            <div class="pin-tooltip">Deliver here</div>
            <i class="material-icons-outlined" style="font-size: 45px; color: var(--emerald);">location_on</i>
        </div>
    </div>

    <div class="delivery-sheet">
        <div class="loc-details">
            <p id="coords">📍 Loading real map data...</p>
        </div>
        <button class="btn-main">Confirm Location</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // আপনার সচল টোকেন
        var token = 'pk.68eadc86fd456ee554e3699e4c52e557';

        // ম্যাপ সেটআপ
        var map = L.map('map', { zoomControl: false }).setView([22.6541, 88.8471], 15);

        // রিয়েল ম্যাপ লেয়ার - এটিই ম্যাপের ছবি আনে
        L.tileLayer('https://{s}.tile.locationiq.com/v3/streets/r/{z}/{x}/{y}.png?key=' + token, {
            maxZoom: 18,
            attribution: '© LocationIQ'
        }).addTo(map);

        // লোকেশন আপডেট ফাংশন
        map.on('move', function() {
            var center = map.getCenter();
            document.getElementById('coords').innerText = center.lat.toFixed(5) + ", " + center.lng.toFixed(5);
        });
    </script>
</body>
</html>
