<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login - MingleJoys</title>
<style>
  /* ১. গ্লোবাল সেটিংস */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }

  input { user-select: text; -webkit-user-select: text; }

  body {
    background-color: #ffffff;
    display: flex; flex-direction: column;
    height: 100vh; align-items: center;
    overflow: hidden;
  }

  .top-container {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; margin-top: -20px;
  }

  .logo-img { width: 65px; margin-bottom: 10px; pointer-events: none; }
  h1 { font-size: 24px; font-weight: 700; color: #059669; margin-bottom: 35px; letter-spacing: -0.5px; }

  .form-box { width: 88%; max-width: 380px; }
  .input-group { margin-bottom: 15px; position: relative; }

  input {
    width: 100%; padding: 15px 16px; border: 1.5px solid #dddfe2;
    border-radius: 12px; font-size: 16px; outline: none;
    background: #f5f6f7; transition: 0.3s;
  }

  input:focus { border-color: #059669; background: #fff; }

  .eye-icon {
    position: absolute; right: 15px; top: 50%;
    transform: translateY(-50%); cursor: pointer;
    width: 22px; opacity: 0.6;
  }

  /* ২. বাটন ও আপনার আগের সাধারণ স্পিনার ডিজাইন */
  .login-btn, .create-btn {
    width: 100%; height: 54px; 
    border-radius: 30px; font-size: 16px; font-weight: 700;
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; position: relative; border: none;
  }

  .login-btn { background: #059669; color: #fff; margin-top: 10px; }
  .create-btn { 
    background: #fff; color: #059669; 
    border: 1.5px solid #059669; width: 90%; max-width: 380px; 
    margin-bottom: 25px;
  }

  /* আপনার আগের সেই সাধারণ গোল স্পিনার */
  .spinner-container {
    display: none;
    width: 22px; height: 22px;
  }

  .standard-spinner {
    width: 100%; height: 100%;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: 3px solid #ffffff; /* সাদা স্পিনার */
    border-radius: 50%;
    animation: rotate 0.8s linear infinite;
  }

  /* ক্রিয়েট অ্যাকাউন্ট বাটনের জন্য সবুজ স্পিনার */
  .spinner-green .standard-spinner {
    border: 3px solid rgba(5, 150, 105, 0.1);
    border-top: 3px solid #059669;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .bottom-container {
    width: 100%; padding: 20px;
    display: flex; flex-direction: column;
    align-items: center; margin-bottom: 25px;
  }

  .slogan-text { font-size: 12px; color: #8a8d91; margin-bottom: 5px; }
  .footer-brand { font-size: 13px; font-weight: 700; color: #059669; letter-spacing: 1px; }

  .disabled { pointer-events: none; opacity: 0.8; }
</style>
</head>
<body oncontextmenu="return false;">

  <div class="top-container">
    <img src="1000043334-removebg-preview.png" class="logo-img" alt="Logo">
    <h1>MingleJoys</h1>

    <div class="form-box">
      <div class="input-group">
        <input type="text" id="userInput" placeholder="Mobile number or email">
      </div>
      <div class="input-group">
        <input type="password" id="passInput" placeholder="Password">
        <img src="eye-close.png" id="eyeIcon" class="eye-icon" onclick="togglePassword()">
      </div>
      
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        <span id="loginText">Log In</span>
        <div class="spinner-container" id="loginSpinner">
            <div class="standard-spinner"></div>
        </div>
      </button>
    </div>
  </div>

  <div class="bottom-container">
    <button class="create-btn" id="createBtn" onclick="handleCreate()">
      <span id="createText">Create new account</span>
      <div class="spinner-container spinner-green" id="createSpinner">
          <div class="standard-spinner"></div>
      </div>
    </button>
    
    <p class="slogan-text">Connect. Share. Enjoy.</p>
    <p class="footer-brand">MINGLEJOYS</p>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1h3IIRC9la-kXyYnVEfwxzzoyBIL70Js",
  authDomain: "my-website-a0545.firebaseapp.com",
  projectId: "my-website-a0545"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.handleLogin = function() {
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const text = document.getElementById('loginText');
  const email = document.getElementById('userInput').value;
  const password = document.getElementById('passInput').value;

  if(!email || !password) return;

  btn.classList.add('disabled');
  text.style.display = "none";
  spinner.style.display = "block";

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        window.location.href = "home.html";
    })
    .catch((error) => {
        alert(error.message);
        resetUI();
    });
};

window.handleCreate = function() {
    const btn = document.getElementById('createBtn');
    const spinner = document.getElementById('createSpinner');
    const text = document.getElementById('createText');

    btn.classList.add('disabled');
    text.style.display = "none";
    spinner.style.display = "block";

    setTimeout(() => {
        window.location.href = "signup_name.html";
    }, 800);
};

function resetUI() {
    document.querySelectorAll('.spinner-container').forEach(s => s.style.display = "none");
    document.getElementById('loginText').style.display = "block";
    document.getElementById('createText').style.display = "block";
    document.querySelectorAll('.login-btn, .create-btn').forEach(b => b.classList.remove('disabled'));
}

window.onpageshow = function() { resetUI(); };
</script>
  
<script>
    function togglePassword() {
      const passInput = document.getElementById('passInput');
      const eyeIcon = document.getElementById('eyeIcon');
      if (passInput.type === "password") {
        passInput.type = "text";
        eyeIcon.src = "eye-open.png";
      } else {
        passInput.type = "password";
        eyeIcon.src = "eye-close.png";
      }
    }
</script>

</body>
</html>
