<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys - Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0; padding: 0;
    background-color: #ffffff; /* পিওর সাদা ব্যাকগ্রাউন্ড */
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  /* লোগো কন্টেইনার - স্ক্রিনের মাঝখানে রাখার জন্য */
  .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 250px; /* লোগোর সাইজ */
    height: 250px;
  }

  /* লোগো ইমেজ */
  .logo-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* ছবির অনুপাত ঠিক রাখবে */
  }

  /* ব্র্যান্ডের নাম */
  .brand-text {
    margin-top: 40px;
    font-size: 24px;
    font-weight: 800;
    color: #059669; /* আপনার লোগোর সবুজ রঙ */
    letter-spacing: 5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="logo-container">
    <img src="1000043340-removebg-preview (1).png" alt="MingleJoys Logo">
  </div>

  <div class="brand-text">MINGLEJOYS</div>

  <script>
    // ৪ সেকেন্ড পর রিডাইরেক্ট হবে
    setTimeout(function() {
      window.location.href = "home.html";
    }, 4000);
  </script>

</body>
</html>
