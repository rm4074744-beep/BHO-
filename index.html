<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ১. নিরাপত্তা ও বেসিক সেটআপ */
  * {
    font-family: 'Inter', sans-serif !important;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  input { -webkit-user-select: text; user-select: text; }

  body {
    margin: 0; padding: 0;
    background-color: #ffffff;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }

  /* থ্রি ডট মেনু ও ড্রপডাউন */
  .header-actions {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    padding: 15px 20px;
    position: relative;
  }
  
  .more-dots {
    cursor: pointer;
    font-size: 26px;
    font-weight: bold;
    color: #555;
    letter-spacing: 2px;
  }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: 55px; right: 20px;
    background: white;
    box-shadow: 0 4px 25px rgba(0,0,0,0.1);
    border-radius: 12px;
    z-index: 1000;
    width: 200px;
    border: 1px solid #f0f0f0;
    overflow: hidden;
  }

  .dropdown-item {
    padding: 14px 16px;
    font-size: 15px;
    color: #333;
    cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
  }

  /* লোগো সেকশন - ক্লিন এবং বর্ডারহীন */
  .logo-section { 
    margin-top: 40px; 
    margin-bottom: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-img { 
    width: 85px; 
    height: 85px; 
    object-fit: contain; 
    pointer-events: none;
    /* আপনার পাঠানো ছবির বিচ্ছিরি চারকোনা ভাব দূর করার জন্য */
    background: transparent;
    border-radius: 50%; /* লোগোর রাউন্ডেড শেপ বজায় রাখতে */
  }

  h1 { 
    font-size: 36px; 
    font-weight: 800; 
    margin: 5px 0 40px 0; 
    color: #111827; 
    text-align: center;
    letter-spacing: -1.5px;
  }

  /* ফর্ম বক্স ও ইনপুট */
  .form-box { width: 90%; max-width: 400px; }
  .input-group { position: relative; width: 100%; margin-bottom: 15px; }
  
  input {
    width: 100%; padding: 18px; border: 1.5px solid #e5e7eb; border-radius: 16px;
    font-size: 16px; outline: none; background: #f9fafb;
    transition: all 0.3s ease;
  }
  input:focus { 
    border-color: #059669; 
    background: #fff; 
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08); 
  }

  .eye-icon-img {
    position: absolute; right: 18px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; width: 24px; opacity: 0.4;
  }

  /* লগইন বাটন - আপনার ছবির সবুজ রঙের সাথে মিল রেখে */
  .login-btn {
    width: 100%; padding: 16px;
    background: #059669; 
    color: white; border: none; border-radius: 35px; 
    font-size: 18px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 15px rgba(5, 150, 105, 0.2);
    display: flex; justify-content: center; align-items: center; gap: 10px;
    transition: 0.3s;
    margin-top: 10px;
  }
  .login-btn:active { transform: scale(0.97); }

  /* বটম সেকশন */
  .create-btn {
    width: 90%; padding: 14px;
    background: none; color: #059669;
    border: 2px solid #059669; 
    border-radius: 35px;
    font-size: 16px; font-weight: 700; 
    margin: 0 auto 30px auto;
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; transition: 0.3s;
  }

  .bottom-section {
    width: 100%; max-width: 400px; margin-top: auto;
    padding-bottom: 30px; text-align: center;
  }

  .white-spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: 3px solid #ffffff;
    border-radius: 50%;
    display: none;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  .disabled { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body oncontextmenu="return false;">

  <div class="header-actions">
    <div class="more-dots" onclick="toggleMenu(event)">...</div>
    <div class="dropdown-menu" id="mainMenu">
      <div class="dropdown-item">Help Center</div>
      <div class="dropdown-item" onclick="toggleLang(event)">Language ▸</div>
    </div>
  </div>

  <div class="logo-section">
    <img src="Screenshot_2026_0301_144814.png" class="logo-img">
  </div>
  <h1 id="page-brand">MingleJoys</h1>

  <div class="form-box">
    <div class="input-group">
      <input type="text" id="userInput" placeholder="Mobile number or email">
    </div>
    <div class="input-group">
      <input type="password" id="passInput" placeholder="Password">
      <img src="Screenshot_2026_0224_015913.png" id="eyeIcon" class="eye-icon-img" onclick="togglePass()">
    </div>
    
    <button class="login-btn" id="login-btn" onclick="handleLogin()">
      <span id="login-btn-text">Log In</span>
      <div class="white-spinner" id="login-spinner"></div>
    </button>
  </div>

  <div class="bottom-section">
    <button class="create-btn" id="create-btn" onclick="handleCreateAccount()">
      <span id="create-btn-text">Create new account</span>
    </button>
    <p style="font-size: 13px; color: #6b7280; margin-bottom: 5px;">Connect. Share. Enjoy.</p>
    <p style="font-size: 14px; font-weight: 800; color: #4b5563; margin: 0; letter-spacing: 1px;">MINGLEJOYS</p>
  </div>

<script>
  function handleLogin() {
    const user = document.getElementById("userInput").value.trim();
    const pass = document.getElementById("passInput").value.trim();
    const btnText = document.getElementById("login-btn-text");
    const spinner = document.getElementById("login-spinner");
    const btn = document.getElementById("login-btn");

    if (!user || !pass) {
      alert("Please enter both email and password.");
      return;
    }

    btnText.style.display = "none";
    spinner.style.display = "block";
    btn.classList.add("disabled");
    
    localStorage.setItem("mj_login_email", user);
    setTimeout(() => { window.location.href = "account_list.html"; }, 1500);
  }

  function handleCreateAccount() {
    window.location.href = "join.html";
  }

  function toggleMenu(e) { e.stopPropagation(); document.getElementById("mainMenu").classList.toggle("show"); }
  
  function togglePass() {
    const input = document.getElementById("passInput");
    const icon = document.getElementById("eyeIcon");
    input.type = (input.type === "password") ? "text" : "password";
    icon.src = (input.type === "password") ? "Screenshot_2026_0224_015913.png" : "Screenshot_2026_0224_020024.png";
  }

  // মেনু দেখানোর জন্য সিম্পল স্ক্রিপ্ট
  document.getElementById("mainMenu").style.display = "none";
  function toggleMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById("mainMenu");
    menu.style.display = (menu.style.display === "none") ? "block" : "none";
  }
  window.onclick = function() { document.getElementById("mainMenu").style.display = "none"; }
</script>
</body>
</html>
