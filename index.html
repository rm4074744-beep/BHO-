<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys - Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0; padding: 0;
    background-color: #ffffff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  /* অ্যানিমেশন কন্টেইনার */
  .loader-container {
    position: relative;
    width: 250px;
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .layer {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  /* ১. মাঝখানের স্থির লোগো (Static Center) */
  .center-logo {
    width: 100px;
    height: 100px;
    z-index: 10;
    background-image: url('InShot_20260316_031149836.jpg');
  }

  /* ২. মোটা কক্ষপথ (Thick Outer Ring) - ঘড়ির কাঁটার দিকে */
  .thick-orbit {
    width: 165px;
    height: 165px;
    background-image: url('InShot_20260316_032058941.jpg');
    animation: rotateCW 2s infinite linear;
    z-index: 5;
  }

  /* ৩. সরু কক্ষপথ (Thin Outer Ring) - উল্টো দিকে */
  .thin-orbit {
    width: 220px;
    height: 220px;
    background-image: url('InShot_20260316_041510763.jpg');
    animation: rotateCCW 2.5s infinite linear;
    z-index: 1;
    opacity: 0.7;
  }

  /* রোটেশন অ্যানিমেশন */
  @keyframes rotateCW {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes rotateCCW {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  /* ব্র্যান্ডের নাম */
  .brand-text {
    margin-top: 50px;
    font-size: 20px;
    font-weight: 800;
    color: #059669;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="loader-container">
    <div class="layer thin-orbit"></div>
    <div class="layer thick-orbit"></div>
    <div class="layer center-logo"></div>
  </div>

  <div class="brand-text">MINGLEJOYS</div>

  <script>
    // ২ সেকেন্ড পর home.html পেজে অটোমেটিক নিয়ে যাবে
    setTimeout(function() {
      window.location.href = "home.html";
    }, 2000);
  </script>

</body>
</html>
