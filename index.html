<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* ১. কন্টেইনার এবং ব্যাকগ্রাউন্ড */
  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    background-color: #ffffff;
    overflow: hidden;
  }

  .splash-container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ২. লোগো অ্যানিমেশন (Fade-in + Zoom + Blur) */
  .logo-box {
    opacity: 0;
    filter: blur(10px);
    transform: scale(0.8);
    animation: logoReveal 1.2s ease-out forwards;
  }

  .logo-img {
    width: 140px; /* আপনার লোগোর সাইজ */
    height: auto;
    animation: logoGlow 2.5s infinite alternate 1.2s;
  }

  @keyframes logoReveal {
    to {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }
  }

  @keyframes logoGlow {
    to {
      filter: drop-shadow(0 0 15px rgba(5, 150, 105, 0.4)); /* ব্র্যান্ড সবুজ গ্লো */
    }
  }

  /* ৩. ৫টি ডট অ্যানিমেশন (Sequential Pulse) */
  .dot-container {
    margin-top: 40px;
    display: flex;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 0.5s ease-in forwards 0.8s;
  }

  .dot {
    width: 10px;
    height: 10px;
    background-color: #059669;
    border-radius: 50%;
    transform: scale(0.6);
    opacity: 0.3;
    animation: dotPulse 1.4s infinite ease-in-out;
  }

  /* ডটগুলোর সিকোয়েন্স */
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .dot:nth-child(4) { animation-delay: 0.6s; }
  .dot:nth-child(5) { animation-delay: 0.8s; }

  @keyframes dotPulse {
    0%, 100% { transform: scale(0.6); opacity: 0.3; }
    50% { transform: scale(1.3); opacity: 1; }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* পেজ ট্রানজিশন ফেড আউট (শেষে যাওয়ার সময়) */
  .fade-out {
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
  }
</style>
</head>
<body id="body">

  <div class="splash-container" id="splash">
    <div class="logo-box">
      <img src="1000043334-removebg-preview.png" class="logo-img" alt="MingleJoys">
    </div>

    <div class="dot-container">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // ৩ সেকেন্ড (৩০০০ মিলি-সেকেন্ড) পর লগইন পেজে নিয়ে যাওয়ার লজিক
    setTimeout(function() {
      // স্ক্রিনটি হালকা ফেড আউট হবে
      document.getElementById('body').classList.add('fade-out');
      
      // ০.৫ সেকেন্ড পর পেজ পরিবর্তন হবে
      setTimeout(function() {
        window.location.href = "login.html"; // আপনার লগইন ফাইলের নাম এখানে দিন
      }, 500);
      
    }, 3000); 
  </script>

</body>
</html>
