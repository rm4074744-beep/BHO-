<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys Splash</title>
<style>
  /* ১. সিস্টেম সাউন্ড ও টাচ প্রোটেকশন (সবচেয়ে শক্তিশালী লেয়ার) */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; 
    -webkit-tap-highlight-color: transparent; 
    touch-action: none; /* স্ক্রিনে টিপে ধরলে কোনো 'গুম' শব্দ হবে না */
  }

  body, html {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #ffffff 0%, #f4f9ff 100%);
    font-family: 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ২. লোগো ও ৪-ডট পজিশন (Visual Center) */
  .main-group {
    position: absolute;
    top: 44%; 
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
  }

  /* লোগো অ্যানিমেশন (Fade + Slight Zoom) */
  .logo-box {
    opacity: 0;
    transform: scale(0.9);
    animation: logoEntry 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  .logo-img {
    width: 110px;
    height: auto;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.05));
    pointer-events: none;
    -webkit-user-drag: none;
  }

  @keyframes logoEntry {
    to { opacity: 1; transform: scale(1); }
  }

  /* ৩. ৪টি ডট অ্যানিমেশন (Sequential Pulse Flow: ● ○ ○ ○) */
  .dot-loader {
    margin-top: 32px;
    display: flex;
    justify-content: center;
    gap: 14px;
    opacity: 0;
    animation: fadeIn 0.5s forwards 0.8s;
  }

  .dot {
    width: 9px; height: 9px;
    background-color: #059669; /* ব্র্যান্ড গ্রিন */
    border-radius: 50%;
    opacity: 0.2;
    transform: scale(0.8);
    animation: dotPulseFlow 1.6s infinite ease-in-out;
  }

  /* ডট সিকোয়েন্স টাইমিং (● ○ ○ ○ → ○ ● ○ ○) */
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.3s; }
  .dot:nth-child(3) { animation-delay: 0.6s; }
  .dot:nth-child(4) { animation-delay: 0.9s; }

  @keyframes dotPulseFlow {
    0%, 100% { transform: scale(0.8); opacity: 0.2; }
    50% { transform: scale(1.3); opacity: 1; }
  }

  /* ৪. নিচের ব্র্যান্ডিং ফুটার (স্থির) */
  .footer-section {
    position: absolute;
    bottom: 50px;
    text-align: center;
    width: 100%;
  }

  .powered-text {
    font-size: 13px;
    color: #94a3b8;
    display: block;
    margin-bottom: 2px;
  }

  .brand-footer {
    font-size: 19px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: 1px;
  }

  /* এক্সিট ট্রানজিশন ফেড আউট */
  .fade-exit {
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }

  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body id="mainBody">

  <div class="main-group">
    <div class="logo-box">
      <img src="1000043334-removebg-preview.png" class="logo-img" alt="MingleJoys">
    </div>
    
    <div class="dot-loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="footer-section">
    <span class="powered-text">powered by</span>
    <div class="brand-footer">MingleJoys</div>
  </div>

  <script>
    /* --- ১. সাইলেন্ট ও সিকিউর মোড লক --- */
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('touchstart', function(e) {
      if (e.cancelable) e.preventDefault(); // 'গুম' শব্দ বা ভাইব্রেশন বন্ধ করবে
    }, { passive: false });

    document.ondragstart = function() { return false; };
    document.onselectstart = function() { return false; };

    // ইনস্পেক্ট লক
    setInterval(function() { debugger; }, 100);

    /* --- ২. অটোমেটিক রিডাইরেক্ট টু লগইন (login.html) --- */
    // ৪ সেকেন্ড পর ফেড আউট শুরু হবে এবং ৪.৮ সেকেন্ডে লগইন পেজে যাবে
    setTimeout(function() {
      document.getElementById('mainBody').classList.add('fade-exit');
      
      setTimeout(function() {
        window.location.href = "login.html"; // আপনার লগইন পেজের ফাইল নেম
      }, 800);
      
    }, 4000); 
  </script>

</body>
</html>
