<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  /* ১. নিরাপত্তা ও বেসিক সেটআপ */
  * {
    font-family: 'Inter', sans-serif !important;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  input { -webkit-user-select: text; user-select: text; }

  body {
    margin: 0; padding: 0;
    background-color: #ffffff;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }

  /* থ্রি ডট মেনু ও ড্রপডাউন */
  .header-actions {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    padding: 15px 20px;
    position: relative;
  }
  
  .more-dots {
    cursor: pointer;
    font-size: 26px;
    font-weight: bold;
    color: #555;
    letter-spacing: 2px;
  }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: 55px; right: 20px;
    background: white;
    box-shadow: 0 4px 25px rgba(0,0,0,0.1);
    border-radius: 12px;
    z-index: 1000;
    width: 200px;
    border: 1px solid #f0f0f0;
    overflow: hidden;
  }

  .dropdown-item {
    padding: 14px 16px;
    font-size: 15px;
    color: #333;
    cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
  }
  .dropdown-item:hover { background-color: #f9f9f9; }

  /* লোগো সেকশন - একদম ক্লিন */
  .logo-section { 
    margin-top: 40px; 
    margin-bottom: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-img { 
    width: 85px; 
    height: 85px; 
    object-fit: contain; 
    pointer-events: none;
    background: transparent;
    border: none !important;
    box-shadow: none !important; /* ছাই রঙ দূর করার জন্য */
  }

  h1 { 
    font-size: 36px; 
    font-weight: 800; 
    margin: 5px 0 40px 0; 
    color: #111827; 
    text-align: center;
    letter-spacing: -1.5px;
  }

  /* ফর্ম ডিজাইন */
  .form-box { width: 90%; max-width: 400px; }
  .input-group { position: relative; width: 100%; margin-bottom: 15px; }
  
  input {
    width: 100%; padding: 18px; border: 1.5px solid #e5e7eb; border-radius: 16px;
    font-size: 16px; outline: none; background: #f9fafb;
    transition: all 0.3s ease;
  }
  input:focus { border-color: #059669; background: #fff; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08); }

  .eye-icon-img {
    position: absolute; right: 18px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; width: 24px; opacity: 0.4;
  }

  /* বাটন ডিজাইন */
  .login-btn {
    width: 100%; padding: 16px;
    background: #059669; 
    color: white; border: none; border-radius: 35px; 
    font-size: 18px; font-weight: 700; cursor: pointer;
    display: flex; justify-content: center; align-items: center; gap: 10px;
    margin-top: 10px;
  }

  .create-btn {
    width: 90%; padding: 14px;
    background: none; color: #059669;
    border: 2px solid #059669; 
    border-radius: 35px;
    font-size: 16px; font-weight: 700; 
    margin: 0 auto 30px auto;
    display: flex; justify-content: center; align-items: center;
    cursor: pointer;
  }

  /* ফাস্ট স্পিনার */
  .spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: 3px solid #ffffff;
    border-radius: 50%;
    display: none;
    animation: spin 0.4s linear infinite;
  }
  .spinner-green { border: 3px solid rgba(5, 150, 105, 0.2); border-top: 3px solid #059669; }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  .bottom-section { width: 100%; max-width: 400px; margin-top: auto; padding-bottom: 30px; text-align: center; }
  .disabled { opacity: 0.6; pointer-events: none; }
  .show { display: block !important; }
</style>
</head>
<body oncontextmenu="return false;">

  <div class="header-actions">
    <div class="more-dots" onclick="toggleMenu(event)">...</div>
    <div class="dropdown-menu" id="mainMenu">
      <div class="dropdown-item" id="help-text">Help Center</div>
      <div class="dropdown-item" onclick="changeLang('en')">English</div>
      <div class="dropdown-item" onclick="changeLang('bn')">বাংলা</div>
      <div class="dropdown-item" onclick="changeLang('hi')">हिन्दी</div>
    </div>
  </div>

  <div class="logo-section">
    <img src="Screenshot_2026_0301_144814.png" class="logo-img">
  </div>
  <h1 id="page-brand">MingleJoys</h1>

  <div class="form-box">
    <div class="input-group">
      <input type="text" id="userInput" placeholder="Mobile number or email">
    </div>
    <div class="input-group">
      <input type="password" id="passInput" placeholder="Password">
      <img src="Screenshot_2026_0224_015913.png" id="eyeIcon" class="eye-icon-img" onclick="togglePass()">
    </div>
    
    <button class="login-btn" id="login-btn" onclick="handleLogin()">
      <span id="login-btn-text">Log In</span>
      <div class="spinner" id="login-spinner"></div>
    </button>
  </div>

  <div class="bottom-section">
    <button class="create-btn" id="create-btn" onclick="handleCreateAccount()">
      <span id="create-btn-text">Create new account</span>
      <div class="spinner spinner-green" id="create-spinner"></div>
    </button>
    <p style="font-size: 13px; color: #6b7280; margin-bottom: 5px;" id="slogan-text">Connect. Share. Enjoy.</p>
    <p style="font-size: 14px; font-weight: 800; color: #4b5563; margin: 0; letter-spacing: 1px;">MINGLEJOYS</p>
  </div>

<script>
  // ভাষার ডাটা সেটআপ
  const languages = {
    'en': { user: "Mobile number or email", pass: "Password", login: "Log In", create: "Create new account", slogan: "Connect. Share. Enjoy.", help: "Help Center" },
    'bn': { user: "মোবাইল নম্বর বা ইমেল", pass: "পাসওয়ার্ড", login: "লগ ইন", create: "নতুন অ্যাকাউন্ট তৈরি করুন", slogan: "যুক্ত হন। শেয়ার করুন। আনন্দ করুন।", help: "সহায়তা কেন্দ্র" },
    'hi': { user: "मोबाइल नंबर या ईमेल", pass: "पासवर्ड", login: "लॉग इन", create: "नया अकाउंट बनाएँ", slogan: "जुड़ें। साझा करें। आनंद लें।", help: "सहायता केंद्र" }
  };

  function changeLang(lang) {
    const data = languages[lang];
    document.getElementById("userInput").placeholder = data.user;
    document.getElementById("passInput").placeholder = data.pass;
    document.getElementById("login-btn-text").innerText = data.login;
    document.getElementById("create-btn-text").innerText = data.create;
    document.getElementById("slogan-text").innerText = data.slogan;
    document.getElementById("help-text").innerText = data.help;
    document.getElementById("mainMenu").classList.remove("show");
  }

  // লগইন: ০.০৫২ সেকেন্ড পর ট্রান্সফার
  function handleLogin() {
    const btnText = document.getElementById("login-btn-text");
    const spinner = document.getElementById("login-spinner");
    const btn = document.getElementById("login-btn");

    btnText.style.display = "none";
    spinner.style.display = "block";
    btn.classList.add("disabled");

    setTimeout(() => { window.location.href = "account_list.html"; }, 52);
  }

  // ক্রিয়েট অ্যাকাউন্ট: ০.০৬৭ সেকেন্ড পর ট্রান্সফার
  function handleCreateAccount() {
    const btnText = document.getElementById("create-btn-text");
    const spinner = document.getElementById("create-spinner");
    const btn = document.getElementById("create-btn");

    btnText.style.display = "none";
    spinner.style.display = "block";
    btn.classList.add("disabled");

    setTimeout(() => { window.location.href = "join.html"; }, 67);
  }

  function togglePass() {
    const input = document.getElementById("passInput");
    const icon = document.getElementById("eyeIcon");
    input.type = (input.type === "password") ? "text" : "password";
    icon.src = (input.type === "password") ? "Screenshot_2026_0224_015913.png" : "Screenshot_2026_0224_020024.png";
  }

  function toggleMenu(e) {
    e.stopPropagation();
    document.getElementById("mainMenu").classList.toggle("show");
  }

  window.onclick = function() { document.getElementById("mainMenu").classList.remove("show"); }
</script>
</body>
</html>
