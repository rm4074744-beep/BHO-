<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys - Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0; padding: 0;
    background-color: #ffffff; /* পিওর সাদা ব্যাকগ্রাউন্ড */
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .loader-container {
    position: relative;
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .layer {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    /* এই লাইনটি সাদা ব্যাকগ্রাউন্ড রিমুভ করে ছবিকে স্বচ্ছ দেখাবে */
    mix-blend-mode: multiply; 
  }

  /* ১. মাঝখানের স্থির লোগো */
  .center-logo {
    width: 90px;
    height: 90px;
    z-index: 10;
    background-image: url('InShot_20260316_031149836.jpg');
  }

  /* ২. মোটা কক্ষপথ - ঘড়ির কাঁটার দিকে */
  .thick-orbit {
    width: 160px;
    height: 160px;
    background-image: url('InShot_20260316_032058941.jpg');
    animation: rotateCW 3s infinite linear;
    z-index: 5;
  }

  /* ৩. সরু কক্ষপথ - উল্টো দিকে */
  .thin-orbit {
    width: 220px;
    height: 220px;
    background-image: url('InShot_20260316_041510763.jpg');
    animation: rotateCCW 4s infinite linear;
    z-index: 1;
  }

  @keyframes rotateCW {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes rotateCCW {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  .brand-text {
    margin-top: 50px;
    font-size: 22px;
    font-weight: 800;
    color: #059669;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <div class="loader-container">
    <div class="layer thin-orbit"></div>
    <div class="layer thick-orbit"></div>
    <div class="layer center-logo"></div>
  </div>

  <div class="brand-text">MINGLEJOYS</div>

  <script>
    // ২.৫ সেকেন্ড পর লগইন পেজে নিয়ে যাবে
    setTimeout(function() {
      window.location.href = "home.html";
    }, 2500);
  </script>

</body>
</html>
