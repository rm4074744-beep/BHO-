<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MingleJoys - Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">

<style>
  /* ১. সিকিউরিটি এবং সিলেকশন পুরোপুরি বন্ধ */
  * {
    -webkit-tap-highlight-color: transparent; /* ট্যাপ করলে নীল বক্স হবে না */
    -webkit-touch-callout: none;                /* আইফোনে মেনু বন্ধ */
    -webkit-user-select: none;                   /* টেক্সট সিলেকশন বন্ধ */
    user-select: none;
  }

  body {
    margin: 0; padding: 0;
    background-color: #ffffff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .logo-container {
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none; /* লোগোর ওপর ট্যাপ করলে কোনো কাজই হবে না */
  }

  .logo-container img {
    max-width: 100%;
    height: auto;
  }

  .brand-text {
    margin-top: 15px;
    font-size: 24px;
    font-weight: 800;
    color: #059669;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  /* গ্লোয়িং লোডিং বার */
  .loading-section {
    margin-top: 35px;
    text-align: center;
  }

  .loading-text {
    font-size: 13px;
    color: #999;
    margin-bottom: 10px;
  }

  .glow-line {
    width: 150px; height: 2px;
    background: #f0f0f0;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  .glow-line::before {
    content: '';
    position: absolute;
    left: -50%;
    height: 100%; width: 50%;
    background: linear-gradient(90deg, transparent, #059669, transparent);
    animation: sweep 2s infinite linear;
  }

  @keyframes sweep {
    0% { left: -50%; }
    100% { left: 100%; }
  }
</style>
</head>
<body oncontextmenu="return false;">

  <div class="logo-container">
    <img src="1000043334-removebg-preview.png" alt="MingleJoys Logo">
  </div>

  <div class="brand-text">MINGLEJOYS</div>

  <div class="loading-section">
    <p class="loading-text">Connecting to Mingle...</p>
    <div class="glow-line"></div>
  </div>

  <script>
    /* শব্দ এবং ভাইব্রেশন বন্ধ করার জন্য অতিরিক্ত নিরাপত্তা */
    
    // ১. লং প্রেস ইভেন্ট আটকে দেওয়া
    window.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
            e.preventDefault(); // মাল্টি টাচ বন্ধ
        }
    }, {passive: false});

    // ২. কোনো এলিমেন্টের ওপর চেপে ধরে রাখা পুরোপুরি বন্ধ
    window.oncontextmenu = function(event) {
        event.preventDefault();
        event.stopPropagation();
        return false;
    };

    // ৩. সিলেকশন পুরোপুরি ব্লক করা (সব ব্রাউজারের জন্য)
    document.onselectstart = function() { return false; };

    // ৪.৫ সেকেন্ড পর রিডাইরেক্ট
    setTimeout(function() {
      window.location.href = "home.html";
    }, 4500);
  </script>

</body>
</html>
