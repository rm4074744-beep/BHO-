<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Identify yourself - MingleJoys</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* ফোনের সিস্টেম ফন্ট ওভাররাইড করতে বোল্ড লুক */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif !important;
    }

    input {
      -webkit-user-select: text !important;
      user-select: text !important;
    }

    body {
      background-color: #ffffff;
      color: #000;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .back-btn {
      font-size: 20px;
      color: #000;
      cursor: pointer;
      width: fit-content;
      margin-top: 10px;
      margin-bottom: 25px;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800; /* এক্সট্রা বোল্ড */
      margin: 0;
      letter-spacing: -1px;
    }

    p.subtitle {
      color: #65676b;
      font-size: 15px;
      margin-top: 8px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #1c1e21;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      background: #ffffff;
      border: 1.5px solid #008069; /* আপনার অরিজিনাল গ্রিন বর্ডার */
      border-radius: 20px;
      font-size: 17px;
      font-weight: 600;
      color: #1c1e21;
      outline: none;
      transition: 0.2s;
    }

    .footer {
      margin-top: 10px;
    }

    .continue-btn {
      width: 100%;
      background: #008069;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 25px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-display {
      color: #d32f2f;
      font-size: 14px;
      text-align: center;
      margin-top: 15px;
      display: none;
      font-weight: 600;
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="app-container">
    <div class="back-btn" onclick="history.back()">
      <i class="fa-solid fa-chevron-left"></i>
    </div>

    <header>
      <h1>Identify yourself</h1>
      <p class="subtitle">Enter your name to start your MingleJoys journey.</p>
    </header>

    <div class="form-group">
      <label>FIRST NAME</label>
      <input type="text" id="fName" placeholder="First name" autocomplete="off">
    </div>

    <div class="form-group">
      <label>LAST NAME</label>
      <input type="text" id="lName" placeholder="Last name" autocomplete="off">
    </div>

    <div class="footer">
      <button class="continue-btn" id="subBtn">
        <span id="btnText">Continue</span>
        <div class="loader" id="loader"></div>
      </button>
      <p id="error-display"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    // কনফিগ একদম নির্ভুলভাবে চেক করা হয়েছে
    const firebaseConfig = {
      apiKey: "AIzaSyA1h3IIRC9la-kXyYnVEfwxzzoyBIL70Js",
      authDomain: "my-website-a0545.firebaseapp.com",
      databaseURL: "https://my-website-a0545-default-rtdb.firebaseio.com",
      projectId: "my-website-a0545",
      storageBucket: "my-website-a0545.firebasestorage.app",
      messagingSenderId: "103602694974",
      appId: "1:103602694974:web:12f890844e6ad6a513da6f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btn = document.getElementById('subBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const errorDisplay = document.getElementById('error-display');

    btn.onclick = async function() {
      const fn = document.getElementById('fName').value.trim();
      const ln = document.getElementById('lName').value.trim();

      if (!fn || !ln) {
        alert("Please enter your name.");
        return;
      }

      btnText.style.display = "none";
      loader.style.display = "block";
      btn.style.pointerEvents = "none";

      const uid = "User_" + Date.now();

      try {
        // ডাটাবেজে তথ্য সেভ করার চেষ্টা
        await set(ref(db, 'registrations/' + uid), {
          firstName: fn,
          lastName: ln,
          timestamp: new Date().toISOString()
        });
        
        // সফল হলে সরাসরি পরের পেজে নিয়ে যাবে
        window.location.replace('signup_birthday.html');

      } catch (err) {
        btnText.style.display = "block";
        loader.style.display = "none";
        btn.style.pointerEvents = "auto";
        
        // যদি এরর হয় তবে লাল রঙে কারণ দেখাবে
        errorDisplay.innerText = "Error: " + err.message;
        errorDisplay.style.display = "block";
      }
    };
  </script>

</body>
</html>
