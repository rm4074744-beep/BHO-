<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identify Yourself - MingleJoys</title>
  <style>
    :root {
      --primary: #008069;
      --bg: #ffffff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      margin-top: 50px;
    }
    h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: var(--primary);
    }
    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 50px;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Identify yourself</h2>
    <p>Enter your name to start your MingleJoys journey.</p>

    <div class="input-group">
      <label>First Name</label>
      <input type="text" id="fName" placeholder="First name">
    </div>

    <div class="input-group">
      <label>Last Name</label>
      <input type="text" id="lName" placeholder="Last name">
    </div>

    <button id="subBtn" class="btn">
      <span id="btnText">Continue</span>
      <div class="spinner" id="loadingSpinner"></div>
    </button>
  </div>

  <script type="module">
    // Firebase SDK Import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    // Your Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyA1h3IIRC9la-kXyYnVEfwxzzoyBIL70Js",
      authDomain: "my-website-a0545.firebaseapp.com",
      databaseURL: "https://my-website-a0545-default-rtdb.firebaseio.com",
      projectId: "my-website-a0545",
      storageBucket: "my-website-a0545.firebasestorage.app",
      messagingSenderId: "103602694974",
      appId: "1:103602694974:web:12f890844e6ad6a513da6f"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btn = document.getElementById('subBtn');
    const btnText = document.getElementById('btnText');
    const spin = document.getElementById('loadingSpinner');

    btn.onclick = async function() {
      const fn = document.getElementById('fName').value.trim();
      const ln = document.getElementById('lName').value.trim();

      if (!fn || !ln) {
        alert("Please enter both First and Last name.");
        return;
      }

      // UI Loading State
      btnText.style.display = "none";
      spin.style.display = "block";
      btn.style.pointerEvents = "none";

      // Unique ID generation
      const uid = "User_" + Date.now();

      try {
        // Saving data to Realtime Database
        await set(ref(db, 'registrations/' + uid), {
          firstName: fn,
          lastName: ln,
          timestamp: new Date().toISOString()
        });

        // Redirect to next page on success
        window.location.href = 'signup_birthday.html';

      } catch (error) {
        // Show error if failed
        btnText.style.display = "block";
        spin.style.display = "none";
        btn.style.pointerEvents = "auto";
        
        alert("Error: " + error.message + "\n\nPlease check if your Firebase Rules are set to true.");
        console.error("Database Error:", error);
      }
    };
  </script>

</body>
</html>
